<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" width="300" height="280">
  <defs>
    <filter id="ds"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1B2A4A" flood-opacity="0.2"/></filter>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#6EC5B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6EC5B8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#B8A9D4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#B8A9D4" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="300" height="280" rx="20" fill="white" stroke="#E8E2DB" stroke-width="2"/>

  <!-- Waves background -->
  <path d="M0,160 Q40,130 80,155 Q120,180 160,145 Q200,110 240,140 Q280,170 300,150 L300,280 L0,280Z" fill="url(#wave2)"/>
  <path d="M0,175 Q50,145 100,170 Q150,195 200,160 Q250,125 300,155 L300,280 L0,280Z" fill="url(#wave1)"/>
  <path d="M0,195 Q60,170 120,190 Q180,210 240,180 Q270,165 300,175 L300,280 L0,280Z" fill="#6EC5B8" opacity="0.08"/>

  <!-- Wave spray -->
  <g fill="#6EC5B8" opacity="0.15">
    <circle cx="85" cy="140" r="3"/><circle cx="78" cy="132" r="2"/>
    <circle cx="92" cy="128" r="1.8"/><circle cx="72" cy="142" r="1.5"/>
  </g>

  <!-- Surfboard - diagonal, riding the wave -->
  <g transform="translate(150,120) rotate(-25)" filter="url(#ds)">
    <!-- Board body -->
    <path d="M0,-75 C-12,-68 -16,-30 -16,10 C-16,50 -10,80 0,90 C10,80 16,50 16,10 C16,-30 12,-68 0,-75Z" fill="#1B2A4A"/>
    <!-- Board stringer -->
    <line x1="0" y1="-68" x2="0" y2="82" stroke="#F2765A" stroke-width="1.5" opacity="0.3"/>
    <!-- Board rail highlight -->
    <path d="M-14,-58 C-15,-30 -15,10 -14,48" fill="none" stroke="white" stroke-width="0.8" opacity="0.08"/>

    <!-- KICKIT text on board -->
    <text x="0" y="-15" text-anchor="middle" font-family="'Rubik','Arial Black',sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="1" transform="rotate(0)">K</text>
    <text x="0" y="0" text-anchor="middle" font-family="'Rubik','Arial Black',sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="1">I</text>
    <text x="0" y="15" text-anchor="middle" font-family="'Rubik','Arial Black',sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="1">C</text>
    <text x="0" y="30" text-anchor="middle" font-family="'Rubik','Arial Black',sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="1">K</text>
    <text x="0" y="45" text-anchor="middle" font-family="'Rubik','Arial Black',sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="1">I</text>
    <text x="0" y="60" text-anchor="middle" font-family="'Rubik','Arial Black',sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="1">T</text>

    <!-- Fin -->
    <path d="M0,78 L-8,92 L0,88 L8,92Z" fill="#F2765A" opacity="0.7"/>

    <!-- Nose accent -->
    <circle cx="0" cy="-62" r="3" fill="#F2765A" opacity="0.5"/>
  </g>

  <!-- Experience icons scattered in the wave -->
  <g filter="url(#ds)">
    <!-- Camera in wave -->
    <g transform="translate(68,145) rotate(-10)">
      <rect x="0" y="2" width="18" height="13" rx="3" fill="#F2765A" opacity="0.7"/>
      <circle cx="9" cy="8.5" r="3.5" fill="#1B2A4A" opacity="0.2"/>
    </g>
    <!-- Mountain in wave -->
    <g transform="translate(220,135)">
      <polygon points="8,20 16,4 24,20" fill="#B8A9D4" opacity="0.6"/>
      <polygon points="16,20 22,8 28,20" fill="#6EC5B8" opacity="0.5"/>
    </g>
    <!-- Ticket in spray -->
    <g transform="translate(195,100) rotate(25)">
      <rect x="0" y="0" width="20" height="12" rx="2" fill="white" opacity="0.5" stroke="#B8A9D4" stroke-width="0.8"/>
    </g>
    <!-- Globe in foam -->
    <g transform="translate(50,165)">
      <circle cx="8" cy="8" r="8" fill="#6EC5B8" opacity="0.4"/>
    </g>
    <!-- Heart -->
    <g transform="translate(240,160)">
      <path d="M6,4 C6,2 4.5,0.8 3,2.4 C1.5,0.8 0,2 0,4 C0,6.5 3,8.5 3,8.5 C3,8.5 6,6.5 6,4Z" fill="#F2A7B3" opacity="0.6"/>
    </g>
  </g>

  <!-- Sparkles -->
  <g fill="#F2765A" opacity="0.4"><path d="M248,55 L249.5,59 L253.5,60 L249.5,61 L248,65 L246.5,61 L242.5,60 L246.5,59Z"/></g>
  <g fill="#F2C75A" opacity="0.35"><path d="M55,55 L56.5,59 L60.5,60 L56.5,61 L55,65 L53.5,61 L49.5,60 L53.5,59Z"/></g>
  <g fill="#B8A9D4" opacity="0.3"><circle cx="260" cy="85" r="2.5"/></g>

  <!-- Text -->
  <text x="150" y="240" text-anchor="middle" font-family="'Rubik','Arial Black',sans-serif" font-size="15" font-weight="900" fill="#1B2A4A" letter-spacing="1.5" opacity="0.8">THE "SEND IT" SURF</text>
  <text x="150" y="258" text-anchor="middle" font-family="'Outfit','Helvetica',sans-serif" font-size="8" font-weight="700" fill="#F2765A" letter-spacing="3" opacity="0.6">KICKIT SPORTS</text>
</svg>